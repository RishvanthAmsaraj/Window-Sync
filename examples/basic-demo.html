<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindowSync - Basic Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 2rem;
            min-height: 100vh;
        }
        
        h1 {
            color: #FF6B35;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            opacity: 0.6;
            margin-bottom: 2rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 1.5rem;
        }
        
        .panel h2 {
            font-size: 0.875rem;
            margin-bottom: 1rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.875rem;
        }
        
        .info-label {
            opacity: 0.6;
        }
        
        .info-value {
            font-family: monospace;
            color: #FF6B35;
        }
        
        button {
            background: #FF6B35;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        button:hover {
            background: #e55a2b;
        }
        
        button.secondary {
            background: rgba(255,255,255,0.1);
        }
        
        .window-list {
            margin-top: 1rem;
        }
        
        .window-item {
            padding: 0.75rem;
            background: rgba(255,255,255,0.03);
            border-radius: 4px;
            margin-bottom: 0.5rem;
            font-family: monospace;
            font-size: 0.75rem;
            border-left: 3px solid #444;
        }
        
        .window-item.active {
            border-left-color: #FF6B35;
            background: rgba(255,107,53,0.05);
        }
        
        .log {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 0.25rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>WindowSync</h1>
    <p class="subtitle">Cross-window state synchronization library</p>
    
    <div class="grid">
        <div class="panel">
            <h2>This Window</h2>
            <div class="info-row">
                <span class="info-label">ID</span>
                <span class="info-value" id="windowId">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Position</span>
                <span class="info-value" id="position">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Size</span>
                <span class="info-value" id="size">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Leader</span>
                <span class="info-value" id="leader">-</span>
            </div>
        </div>
        
        <div class="panel">
            <h2>Sync Pool</h2>
            <div class="info-row">
                <span class="info-label">Total Windows</span>
                <span class="info-value" id="totalWindows">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Last Update</span>
                <span class="info-value" id="lastUpdate">-</span>
            </div>
        </div>
    </div>
    
    <div>
        <button id="btnOpenWindow">Open New Window</button>
        <button id="btnBroadcast" class="secondary">Broadcast Message</button>
        <button id="btnClearLog" class="secondary">Clear Log</button>
    </div>
    
    <h2 style="margin-top: 2rem; font-size: 1rem;">Active Windows</h2>
    <div class="window-list" id="windows"></div>
    
    <h2 style="margin-top: 2rem; font-size: 1rem;">Event Log</h2>
    <div class="log" id="log"></div>

    <script src="../dist/window-sync.js"></script>
    <script>
        // Use the global WindowSync
        const sync = new WindowSync({ 
            syncKey: 'window_sync_demo',
            debug: false
        });
        
        sync.init({ 
            name: 'Demo Window', 
            openedAt: new Date().toLocaleTimeString()
        });
        
        function updateInfo() {
            const win = sync.getThisWindow();
            document.getElementById('windowId').textContent = win.id.slice(-8);
            document.getElementById('position').textContent = `${win.shape.x}, ${win.shape.y}`;
            document.getElementById('size').textContent = `${win.shape.width}x${win.shape.height}`;
            document.getElementById('leader').textContent = sync.isLeader() ? 'Yes' : 'No';
            document.getElementById('totalWindows').textContent = sync.getWindowCount();
            document.getElementById('lastUpdate').textContent = new Date(win.lastSeen).toLocaleTimeString();
        }
        
        function updateWindows() {
            const container = document.getElementById('windows');
            container.innerHTML = '';
            
            sync.getWindows().forEach(w => {
                const div = document.createElement('div');
                div.className = 'window-item' + (w.id === sync.getId() ? ' active' : '');
                div.innerHTML = `
                    <strong>${w.id === sync.getId() ? 'This Window' : 'Window ' + w.id.slice(-4)}</strong><br>
                    Pos: ${w.shape.x}, ${w.shape.y} | 
                    Size: ${w.shape.width}x${w.shape.height}<br>
                    Opened: ${w.metadata.openedAt || 'Unknown'}
                `;
                container.appendChild(div);
            });
        }
        
        function log(message) {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.insertBefore(entry, logEl.firstChild);
            
            while (logEl.children.length > 50) {
                logEl.removeChild(logEl.lastChild);
            }
        }
        
        // Event listeners
        sync.on('windowAdded', ({ window }) => {
            log(`Window added: ${window.id.slice(-8)}`);
            updateWindows();
            updateInfo();
        });
        
        sync.on('windowRemoved', ({ window }) => {
            log(`Window removed: ${window.id.slice(-8)}`);
            updateWindows();
            updateInfo();
        });
        
        sync.on('windowMoved', () => {
            updateInfo();
        });
        
        sync.on('windowResized', ({ window }) => {
            log(`Window resized: ${window.shape.width}x${window.shape.height}`);
            updateInfo();
        });
        
        // Button handlers
        document.getElementById('btnOpenWindow').addEventListener('click', () => {
            const newWindow = window.open(window.location.href, '_blank', 'width=800,height=600');
            if (!newWindow) {
                alert('Popup blocked! Please allow popups for this site.');
            } else {
                log('Opened new window');
            }
        });
        
        document.getElementById('btnBroadcast').addEventListener('click', () => {
            sync.broadcast('chat', { 
                text: 'Hello from window ' + sync.getId().slice(-4),
                time: Date.now()
            });
            log('Broadcasted message');
        });
        
        sync.on('chat', (data, fromId) => {
            log(`Message from ${fromId.slice(-4)}: ${data.text}`);
        });
        
        document.getElementById('btnClearLog').addEventListener('click', () => {
            document.getElementById('log').innerHTML = '';
        });
        
        // Initial update
        updateInfo();
        updateWindows();
        log('WindowSync initialized');
        
        // Update position
        setInterval(updateInfo, 100);
    </script>
</body>
</html>
