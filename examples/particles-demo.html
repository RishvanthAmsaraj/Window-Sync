<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindowSync - Multi-Window Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .ui {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 10;
            pointer-events: none;
        }
        
        .ui > * {
            pointer-events: auto;
        }
        
        h1 {
            font-size: 1rem;
            color: #FF6B35;
            margin-bottom: 0.5rem;
        }
        
        .info {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 1rem;
        }
        
        .controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        button {
            background: #FF6B35;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        button:hover {
            background: #e55a2b;
        }
        
        button.secondary {
            background: rgba(255,255,255,0.1);
        }
        
        button.secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .stats {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.75rem;
            opacity: 0.6;
            z-index: 10;
        }
        
        .instructions {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            text-align: right;
            font-size: 0.75rem;
            opacity: 0.5;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="ui">
        <h1>Multi-Window Particles</h1>
        <div class="info">
            Windows: <span id="windowCount">1</span> | 
            Particles: <span id="particleCount">0</span> |
            FPS: <span id="fps">0</span>
        </div>
        <div class="controls">
            <button id="btnAddWindow">Add Window</button>
            <button id="btnAddParticles">Add Particles</button>
            <button id="btnClear" class="secondary">Clear</button>
            <button id="btnGravity" class="secondary">Toggle Gravity</button>
        </div>
    </div>
    
    <div class="stats">
        Window: <span id="windowId">-</span>
    </div>
    
    <div class="instructions">
        Click to spawn particles<br>
        Open multiple windows to see them flow between screens
    </div>

    <script src="../dist/window-sync.js"></script>
    <script>
        // WindowSync setup
        const sync = new WindowSync({ 
            syncKey: 'window_sync_particles',
            debug: false
        });
        
        sync.init({ 
            type: 'particle-window'
        });
        
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // Particle system
        let particles = [];
        let gravity = false;
        const GRAVITY = 0.2;
        const FRICTION = 0.99;
        
        class Particle {
            constructor(x, y, vx, vy, color, size, life) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.size = size;
                this.life = life;
                this.maxLife = life;
                this.id = Math.random().toString(36).substr(2, 9);
            }
            
            update() {
                if (gravity) {
                    this.vy += GRAVITY;
                }
                
                this.vx *= FRICTION;
                this.vy *= FRICTION;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.life--;
                
                // Bounce off edges
                if (this.x < 0 || this.x > width) {
                    this.vx *= -0.8;
                    this.x = Math.max(0, Math.min(width, this.x));
                }
                if (this.y < 0 || this.y > height) {
                    this.vy *= -0.8;
                    this.y = Math.max(0, Math.min(height, this.y));
                }
            }
            
            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            
            isDead() {
                return this.life <= 0;
            }
        }
        
        // Color palette
        const colors = [
            '#FF6B35', '#F7931E', '#FFD23F', '#06FFA5', 
            '#3BCEAC', '#5D2E8C', '#8B4789', '#EE4B6A'
        ];
        
        function randomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // Spawn particles
        function spawnParticles(x, y, count = 5) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const size = 3 + Math.random() * 6;
                const life = 100 + Math.random() * 100;
                
                const p = new Particle(x, y, vx, vy, randomColor(), size, life);
                particles.push(p);
            }
            
            // Broadcast to other windows
            sync.broadcast('spawn', {
                x: x + window.screenX,
                y: y + window.screenY,
                count: count,
                fromWindow: sync.getId()
            });
        }
        
        // Handle clicks
        canvas.addEventListener('click', (e) => {
            spawnParticles(e.clientX, e.clientY, 10);
        });
        
        // Handle broadcasts from other windows
        sync.on('spawn', (data) => {
            // Convert screen coordinates to local window coordinates
            const localX = data.x - window.screenX;
            const localY = data.y - window.screenY;
            
            // Only spawn if within this window
            if (localX >= 0 && localX <= width && localY >= 0 && localY <= height) {
                for (let i = 0; i < data.count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 4;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const size = 3 + Math.random() * 6;
                    const life = 100 + Math.random() * 100;
                    
                    particles.push(new Particle(localX, localY, vx, vy, randomColor(), size, life));
                }
            }
        });
        
        // Animation loop
        let lastTime = 0;
        let frameCount = 0;
        let fps = 0;
        
        function animate(time) {
            // FPS calculation
            frameCount++;
            if (time - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = time;
            }
            
            // Clear canvas
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // Update and draw particles
            particles = particles.filter(p => {
                p.update();
                p.draw(ctx);
                return !p.isDead();
            });
            
            // Draw window outline
            ctx.strokeStyle = 'rgba(255, 107, 53, 0.3)';
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, width - 2, height - 2);
            
            // Update UI
            document.getElementById('windowCount').textContent = sync.getWindowCount();
            document.getElementById('particleCount').textContent = particles.length;
            document.getElementById('fps').textContent = fps;
            document.getElementById('windowId').textContent = sync.getId().slice(-8);
            
            requestAnimationFrame(animate);
        }
        
        animate(0);
        
        // Button handlers
        document.getElementById('btnAddWindow').addEventListener('click', () => {
            const newWindow = window.open(
                window.location.href,
                '_blank',
                `width=${width},height=${height},left=${window.screenX + width + 20},top=${window.screenY}`
            );
            if (!newWindow) {
                alert('Please allow popups for this site');
            }
        });
        
        document.getElementById('btnAddParticles').addEventListener('click', () => {
            spawnParticles(width / 2, height / 2, 20);
        });
        
        document.getElementById('btnClear').addEventListener('click', () => {
            particles = [];
        });
        
        document.getElementById('btnGravity').addEventListener('click', () => {
            gravity = !gravity;
        });
        
        // Update window count on changes
        sync.on('windowAdded', () => {
            document.getElementById('windowCount').textContent = sync.getWindowCount();
        });
        
        sync.on('windowRemoved', () => {
            document.getElementById('windowCount').textContent = sync.getWindowCount();
        });
    </script>
</body>
</html>
