<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindowSync - Multi-Window Cubes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .ui {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 10;
            pointer-events: none;
        }
        
        .ui > * {
            pointer-events: auto;
        }
        
        h1 {
            font-size: 1rem;
            color: #FF6B35;
            margin-bottom: 0.5rem;
        }
        
        .info {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 1rem;
        }
        
        .controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        button {
            background: #FF6B35;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        button:hover {
            background: #e55a2b;
        }
        
        button.secondary {
            background: rgba(255,255,255,0.1);
        }
        
        button.secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .stats {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.75rem;
            opacity: 0.6;
            z-index: 10;
        }
        
        .instructions {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            text-align: right;
            font-size: 0.75rem;
            opacity: 0.5;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="ui">
        <h1>Multi-Window Cubes</h1>
        <div class="info">
            Windows: <span id="windowCount">1</span> | 
            Cubes: <span id="cubeCount">0</span> |
            FPS: <span id="fps">0</span>
        </div>
        <div class="controls">
            <button id="btnAddWindow">Add Window</button>
            <button id="btnAddCube">Add Cube</button>
            <button id="btnClear" class="secondary">Clear</button>
            <button id="btnAuto" class="secondary">Auto Spawn</button>
        </div>
    </div>
    
    <div class="stats">
        Window: <span id="windowId">-</span>
    </div>
    
    <div class="instructions">
        Click and drag to throw cubes<br>
        Cubes bounce between windows
    </div>

    <script src="../dist/window-sync.js"></script>
    <script>
        // WindowSync setup
        const sync = new WindowSync({ 
            syncKey: 'window_sync_cubes',
            debug: false
        });
        
        sync.init({ 
            type: 'cube-window'
        });
        
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // Cube class
        class Cube {
            constructor(x, y, vx, vy, size, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.size = size;
                this.color = color;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
                this.id = Math.random().toString(36).substr(2, 9);
                this.trail = [];
            }
            
            update() {
                // Store trail
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 10) this.trail.shift();
                
                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;
                
                // Gravity
                this.vy += 0.15;
                
                // Air resistance
                this.vx *= 0.999;
                this.vy *= 0.999;
                
                // Bounce off floor
                if (this.y + this.size > height) {
                    this.y = height - this.size;
                    this.vy *= -0.7;
                    this.vx *= 0.95; // Friction
                }
                
                // Bounce off ceiling
                if (this.y - this.size < 0) {
                    this.y = this.size;
                    this.vy *= -0.7;
                }
                
                // Bounce off walls
                if (this.x + this.size > width) {
                    this.x = width - this.size;
                    this.vx *= -0.7;
                }
                if (this.x - this.size < 0) {
                    this.x = this.size;
                    this.vx *= -0.7;
                }
            }
            
            draw(ctx) {
                // Draw trail
                ctx.globalAlpha = 0.2;
                this.trail.forEach((pos, i) => {
                    const alpha = i / this.trail.length;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(
                        pos.x - this.size * alpha * 0.5,
                        pos.y - this.size * alpha * 0.5,
                        this.size * alpha,
                        this.size * alpha
                    );
                });
                ctx.globalAlpha = 1;
                
                // Draw cube with rotation
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // Main cube
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                
                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size/4);
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(-this.size/2, this.size/4, this.size, this.size/4);
                
                ctx.restore();
            }
        }
        
        // Cube management
        let cubes = [];
        let autoSpawn = false;
        let autoSpawnInterval;
        
        const colors = [
            '#FF6B35', '#F7931E', '#FFD23F', '#06FFA5', 
            '#3BCEAC', '#5D2E8C', '#8B4789', '#EE4B6A'
        ];
        
        function randomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        function addCube(x, y, vx, vy) {
            const size = 20 + Math.random() * 30;
            const cube = new Cube(x, y, vx, vy, size, randomColor());
            cubes.push(cube);
            
            // Broadcast to other windows
            sync.broadcast('addCube', {
                x: x + window.screenX,
                y: y + window.screenY,
                vx: vx,
                vy: vy,
                size: size,
                color: cube.color,
                fromWindow: sync.getId()
            });
        }
        
        // Mouse interaction
        let isDragging = false;
        let dragStartX, dragStartY;
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                // Visual feedback for drag
                ctx.strokeStyle = 'rgba(255, 107, 53, 0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(dragStartX, dragStartY);
                ctx.lineTo(e.clientX, e.clientY);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        });
        
        canvas.addEventListener('mouseup', (e) => {
            if (isDragging) {
                const dx = dragStartX - e.clientX;
                const dy = dragStartY - e.clientY;
                addCube(dragStartX, dragStartY, dx * 0.1, dy * 0.1);
                isDragging = false;
            }
        });
        
        // Handle broadcasts
        sync.on('addCube', (data) => {
            // Convert screen coordinates to local
            const localX = data.x - window.screenX;
            const localY = data.y - window.screenY;
            
            // Only add if within this window
            if (localX >= -50 && localX <= width + 50 && localY >= -50 && localY <= height + 50) {
                const cube = new Cube(localX, localY, data.vx, data.vy, data.size, data.color);
                cubes.push(cube);
            }
        });
        
        // Animation loop
        let lastTime = 0;
        let frameCount = 0;
        let fps = 0;
        
        function animate(time) {
            // FPS
            frameCount++;
            if (time - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = time;
            }
            
            // Clear with fade effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            // Update and draw cubes
            cubes.forEach(cube => {
                cube.update();
                cube.draw(ctx);
            });
            
            // Remove cubes that fell off screen (with buffer)
            cubes = cubes.filter(c => c.y < height + 100);
            
            // Draw window border
            ctx.strokeStyle = 'rgba(255, 107, 53, 0.3)';
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, width - 2, height - 2);
            
            // Update UI
            document.getElementById('windowCount').textContent = sync.getWindowCount();
            document.getElementById('cubeCount').textContent = cubes.length;
            document.getElementById('fps').textContent = fps;
            document.getElementById('windowId').textContent = sync.getId().slice(-8);
            
            requestAnimationFrame(animate);
        }
        
        animate(0);
        
        // Button handlers
        document.getElementById('btnAddWindow').addEventListener('click', () => {
            const newWindow = window.open(
                window.location.href,
                '_blank',
                `width=${width},height=${height},left=${window.screenX + width + 20},top=${window.screenY}`
            );
            if (!newWindow) {
                alert('Please allow popups for this site');
            }
        });
        
        document.getElementById('btnAddCube').addEventListener('click', () => {
            addCube(
                width / 2 + (Math.random() - 0.5) * 100,
                height / 3,
                (Math.random() - 0.5) * 10,
                -5 - Math.random() * 5
            );
        });
        
        document.getElementById('btnClear').addEventListener('click', () => {
            cubes = [];
        });
        
        document.getElementById('btnAuto').addEventListener('click', () => {
            autoSpawn = !autoSpawn;
            const btn = document.getElementById('btnAuto');
            
            if (autoSpawn) {
                btn.textContent = 'Stop Auto';
                btn.style.background = '#EE4B6A';
                autoSpawnInterval = setInterval(() => {
                    addCube(
                        Math.random() * width,
                        -30,
                        (Math.random() - 0.5) * 4,
                        2 + Math.random() * 3
                    );
                }, 500);
            } else {
                btn.textContent = 'Auto Spawn';
                btn.style.background = '';
                clearInterval(autoSpawnInterval);
            }
        });
        
        // Window count updates
        sync.on('windowAdded', () => {
            document.getElementById('windowCount').textContent = sync.getWindowCount();
        });
        
        sync.on('windowRemoved', () => {
            document.getElementById('windowCount').textContent = sync.getWindowCount();
        });
    </script>
</body>
</html>
